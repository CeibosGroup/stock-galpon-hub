<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>Stock Galpón Hub</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --border: #2a3348;
    --text: #e8edf5;
    --text2: #8892a4;
    --text3: #4a5568;
    --green: #22c55e;
    --green-dim: #16a34a22;
    --amber: #f59e0b;
    --amber-dim: #f59e0b22;
    --red: #ef4444;
    --red-dim: #ef444422;
    --blue: #3b82f6;
    --blue-dim: #3b82f622;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* TEMA CLARO */
  body.light {
    --bg: #f0f4f8;
    --bg2: #ffffff;
    --bg3: #e2e8f0;
    --border: #cbd5e1;
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --green: #16a34a;
    --green-dim: #16a34a18;
    --amber: #d97706;
    --amber-dim: #d9770618;
    --red: #dc2626;
    --red-dim: #dc262618;
    --blue: #2563eb;
    --blue-dim: #2563eb18;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(80px + var(--safe-bottom));
  }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 34px; height: 34px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg3);
  }
  .logo-mark img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  .logo-text { font-size: 14px; font-weight: 500; }
  .logo-sub { font-size: 10px; color: var(--text2); font-family: var(--mono); }

  .update-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  #fileInput { display: none; }

  /* KPIs */
  .kpis {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 12px 16px;
  }
  .kpi {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .kpi:active { transform: scale(0.97); }
  .kpi.kpi-active { border-color: currentColor; }
  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi.green::before { background: var(--green); }
  .kpi.amber::before { background: var(--amber); }
  .kpi.red::before { background: var(--red); }
  .kpi.blue::before { background: var(--blue); }
  .kpi-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .kpi-val {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 600;
    line-height: 1;
  }
  .kpi.green .kpi-val { color: var(--green); }
  .kpi.amber .kpi-val { color: var(--amber); }
  .kpi.red .kpi-val { color: var(--red); }
  .kpi.blue .kpi-val { color: var(--blue); }
  .kpi-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }

  /* FILTER TABS */
  .filter-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 0 16px 10px;
    display: flex;
    gap: 6px;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-label-row {
    padding: 0 16px 4px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .filter-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .filter-btn.active-all { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
  .filter-btn.active-herb { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .filter-btn.active-semi { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
  .filter-btn.active-fung { border-color: #a78bfa; color: #a78bfa; background: #a78bfa22; }
  .filter-btn.active-inse { border-color: #fb7185; color: #fb7185; background: #fb718522; }
  .filter-btn.active-coady { border-color: #22d3ee; color: #22d3ee; background: #22d3ee22; }

  .subtipo-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 0 16px 12px;
    display: flex;
    gap: 6px;
  }
  .subtipo-scroll::-webkit-scrollbar { display: none; }
  .sub-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .sub-btn.active { border-color: var(--text2); color: var(--text); background: var(--bg3); }

  /* PRODUCT CARDS */
  .section-header {
    padding: 4px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .row-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  .cards { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    animation: fadeUp 0.2s ease;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .card:active { border-color: var(--text2); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }
  .card-name { font-size: 15px; font-weight: 500; line-height: 1.2; }
  .card-pa { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.3; }

  .card-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .badge-herb { background: var(--green-dim); color: var(--green); border: 1px solid #22c55e33; }
  .badge-semi { background: var(--amber-dim); color: var(--amber); border: 1px solid #f59e0b33; }
  .badge-fung { background: #a78bfa22; color: #a78bfa; border: 1px solid #a78bfa33; }
  .badge-inse { background: #fb718522; color: #fb7185; border: 1px solid #fb718533; }
  .badge-coady { background: #22d3ee22; color: #22d3ee; border: 1px solid #22d3ee33; }
  .badge-default { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

  .status-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
  }
  .status-ok { background: var(--green-dim); color: var(--green); }
  .status-warn { background: var(--amber-dim); color: var(--amber); }
  .status-venc { background: var(--red-dim); color: var(--red); }
  .status-nd { background: var(--bg3); color: var(--text3); }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .card-stat { }
  .card-stat-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 3px;
  }
  .card-stat-val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .card-stat-unit {
    font-size: 10px;
    color: var(--text2);
    font-family: var(--mono);
  }

  .card-venc {
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-venc-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }
  .card-venc-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }

  /* LOTE BADGE */
  .lote-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--blue);
    flex-shrink: 0;
  }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 48px 16px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 13px;
  }

  /* SEARCH */
  .search-wrap {
    padding: 0 16px 10px;
  }
  .search-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px 10px 36px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    position: relative;
  }
  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--text3); }
  .search-container {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }
  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--bg3);
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    border-radius: 50%;
    width: 20px; height: 20px;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .search-clear.visible { display: flex; }

  /* ACORDEÓN LOTES */
  .lotes-acordeon {
    border-top: 1px solid var(--border);
    margin-top: 10px;
    padding-top: 10px;
    display: none;
  }
  .lotes-acordeon.open { display: block; }
  .lotes-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    margin-top: 8px;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .lotes-toggle-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    flex: 1;
  }
  .lotes-toggle-arrow {
    font-size: 10px;
    color: var(--text3);
    transition: transform 0.2s;
  }
  .lotes-toggle.open .lotes-toggle-arrow { transform: rotate(180deg); }
  .lote-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .lote-row:last-child { border-bottom: none; }
  .lote-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--blue);
    font-weight: 600;
  }
  .lote-info {
    text-align: right;
  }
  .lote-stock {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .lote-venc {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-top: 1px;
  }
  .lote-venc.warn { color: var(--amber); }
  .lote-venc.venc { color: var(--red); }

  /* LOGIN */
  #loginScreen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    padding: 24px;
  }
  #loginScreen.hidden { display: none; }
  .login-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 24px;
    width: 100%; max-width: 340px;
  }
  .login-logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .login-logo img { width: 40px; height: 40px; border-radius: 10px; }
  .login-logo-text { font-size: 16px; font-weight: 600; }
  .login-logo-sub { font-size: 11px; color: var(--text2); font-family: var(--mono); }
  .login-field { margin-bottom: 14px; }
  .login-label {
    font-family: var(--mono); font-size: 10px;
    color: var(--text2); text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 6px; display: block;
  }
  .login-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--mono); font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus { border-color: var(--blue); }
  .login-btn {
    width: 100%;
    background: var(--green);
    border: none; border-radius: 8px;
    color: #000; font-family: var(--mono);
    font-size: 13px; font-weight: 600;
    padding: 13px;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.15s;
  }
  .login-btn:active { opacity: 0.85; }
  .login-error {
    color: var(--red); font-family: var(--mono);
    font-size: 11px; margin-top: 10px;
    text-align: center; min-height: 16px;
  }
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    padding-bottom: calc(10px + var(--safe-bottom));
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }
  .bottom-note {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }
  .bottom-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img src="icon-192.png" alt="CG">
      <div>
        <div class="login-logo-text">Galpón Hub</div>
        <div class="login-logo-sub">Ceibos Group</div>
      </div>
    </div>
    <div class="login-field">
      <label class="login-label">Usuario</label>
      <input class="login-input" id="loginUser" type="email" placeholder="usuario@ceibosgroup.com" autocomplete="username">
    </div>
    <div class="login-field">
      <label class="login-label">Contraseña</label>
      <input class="login-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-mark"><img src="icon-192.png" alt="CG"></div>
    <div>
      <div class="logo-text">Galpón Hub</div>
      <div class="logo-sub">Stock insumos</div>
    </div>
  </div>
  <button class="update-btn" onclick="loadFromGitHub()">
    ↑ Actualizar
  </button>
  <button class="update-btn" id="themeBtn" onclick="toggleTheme()" style="margin-left:6px">☀</button>
</header>

<!-- KPIs -->
<div class="kpis">
  <div class="kpi green" onclick="setKpiFilter('todos')">
    <div class="kpi-label">Productos</div>
    <div class="kpi-val" id="kpi-prod">—</div>
    <div class="kpi-sub">en stock</div>
  </div>
  <div class="kpi blue" onclick="setKpiFilter('todos')">
    <div class="kpi-label">Lotes</div>
    <div class="kpi-val" id="kpi-lotes">—</div>
    <div class="kpi-sub">activos</div>
  </div>
  <div class="kpi amber" id="kpi-warn-card" onclick="setKpiFilter('warn')">
    <div class="kpi-label">Próx. vencer</div>
    <div class="kpi-val" id="kpi-warn">—</div>
    <div class="kpi-sub">&lt; 6 meses</div>
  </div>
  <div class="kpi red" id="kpi-venc-card" onclick="setKpiFilter('venc')">
    <div class="kpi-label">Vencidos</div>
    <div class="kpi-val" id="kpi-venc">—</div>
    <div class="kpi-sub">atención</div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-container">
    <span class="search-icon">⌕</span>
    <input type="search" class="search-input" id="searchInput" placeholder="Buscar producto..." oninput="onSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- TIPO FILTER -->
<div class="filter-label-row">Tipo</div>
<div class="filter-scroll" id="tipoScroll">
  <button class="filter-btn active-all" data-tipo="todos" onclick="setTipo('todos', this)">Todos</button>
  <button class="filter-btn" data-tipo="Herbicida" onclick="setTipo('Herbicida', this)">Herbicida</button>
  <button class="filter-btn" data-tipo="Fungicida" onclick="setTipo('Fungicida', this)">Fungicida</button>
  <button class="filter-btn" data-tipo="Insecticida" onclick="setTipo('Insecticida', this)">Insecticida</button>
  <button class="filter-btn" data-tipo="Semilla" onclick="setTipo('Semilla', this)">Semilla</button>
  <button class="filter-btn" data-tipo="Coadyuvante" onclick="setTipo('Coadyuvante', this)">Coadyuvante</button>
  <button class="filter-btn" data-tipo="Biológico" onclick="setTipo('Biológico', this)">Biológico</button>
  <button class="filter-btn" data-tipo="Silobolsa" onclick="setTipo('Silobolsa', this)">Silobolsa</button>
</div>

<!-- SUBTIPO FILTER -->
<div class="subtipo-scroll" id="subtipoScroll"></div>

<!-- CARDS -->
<div class="section-header">
  <span class="section-title">Stock por producto</span>
  <span class="row-count" id="rowCount">— productos</span>
</div>
<div class="cards" id="cardsContainer"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <span class="bottom-note">Ceibos Group — Galpón Hub</span>
  <span class="bottom-date" id="bottomDate">05/04/2026</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const EMBEDDED_DATA = [

let allData = [...EMBEDDED_DATA];

const GITHUB_URL = 'https://raw.githubusercontent.com/CeibosGroup/stock-galpon-hub/main/movimientos.xlsx';

async function loadFromGitHub() {
  const btn = document.querySelector('.update-btn');
  btn.textContent = 'Cargando...';
  btn.disabled = true;
  try {
    const resp = await fetch(GITHUB_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const buffer = await resp.arrayBuffer();
    parseExcelBuffer(buffer);
    document.getElementById('bottomDate').textContent = new Date().toLocaleDateString('es-UY');
  } catch(err) {
    console.error('GitHub fetch error:', err);
    // Fallback a datos embebidos
    allData = [...EMBEDDED_DATA];
    render();
    btn.textContent = '↑ Actualizar';
    btn.disabled = false;
    return;
  }
  btn.textContent = '↑ Actualizar';
  btn.disabled = false;
}

function parseExcelBuffer(buffer) {
  try {
    const wb = XLSX.read(buffer, { type: 'array', cellDates: true });
    console.log('Sheets:', wb.SheetNames);
    const wsName = wb.SheetNames.find(n => n.toLowerCase() === 'tblmovimientos') ||
                   wb.SheetNames.find(n => n.toLowerCase() === 'movimientos') ||
                   wb.SheetNames[0];
    const ws = wb.Sheets[wsName];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, cellDates: true });
    console.log('Total rows:', raw.length);
    let headerRow = -1;
    for (let i = 0; i < Math.min(raw.length, 10); i++) {
      console.log('Row', i, raw[i]);
      if (raw[i] && raw[i].some(c => c && String(c).includes('ID_Mov'))) { headerRow = i; break; }
    }
    if (headerRow === -1) { alert('No se encontró la tabla de movimientos'); return; }
    const headers = raw[headerRow].map(h => String(h||'').replace(/\n/g,' ').trim());
    const iID = headers.findIndex(h => h.includes('ID_Mov'));
    const iFecha = headers.findIndex(h => h.includes('Fecha') && !h.includes('Venc') && !h.includes('Recep'));
    const iProd = headers.findIndex(h => h.includes('Producto'));
    const iPA = headers.findIndex(h => h.includes('Principio'));
    const iTipo = headers.findIndex(h => h === 'Tipo');
    const iSub = headers.findIndex(h => h.includes('Subtipo'));
    const iProv = headers.findIndex(h => h.includes('Proveedor'));
    const iLote = headers.findIndex(h => h.includes('ID_Lote'));
    const iTipMov = headers.findIndex(h => h.includes('Tipo_Mov'));
    const iCant = headers.findIndex(h => h.includes('siempre'));
    const iCantN = headers.findIndex(h => h.includes('Neta'));
    const iUnidad = headers.findIndex(h => h === 'Unidad');
    const iVenc = headers.findIndex(h => h.includes('Vencimiento'));
    const newData = [];
    for (let i = headerRow + 1; i < raw.length; i++) {
      const r = raw[i];
      if (!r || !r[iFecha] || !r[iProd] || String(r[iProd]).trim() === '') continue;
      newData.push({
        id: r[iID]||'', fecha: r[iFecha]||'',
        producto: String(r[iProd]||'').trim(),
        pa: (iPA >= 0 && r[iPA]) ? String(r[iPA]).trim() : '—',
        tipo: String(r[iTipo]||'').trim(),
        subtipo: String(r[iSub]||'').trim(),
        proveedor: String(r[iProv]||'').trim(),
        lote: String(r[iLote]||'').trim(),
        tipo_mov: String(r[iTipMov]||'').trim(),
        cantidad: Number(r[iCant])||0,
        cantidad_neta: (function() {
          const neta = Number(r[iCantN]);
          if (neta !== 0) return neta;
          // fallback: calcular desde cantidad y tipo_mov
          const cant = Number(r[iCant])||0;
          const tm = String(r[iTipMov]||'').trim().toUpperCase();
          return tm === 'ENTRADA' ? cant : -cant;
        })(),
        unidad: String(r[iUnidad]||'').trim(),
        fecha_venc: r[iVenc] ? excelDateToISO(r[iVenc]) : null,
      });
    }
    if (newData.length === 0) { alert('No se encontraron datos'); return; }
    console.log('Parsed rows:', newData.length);
    console.log('All products:', newData.map(d => d.producto + ' | neta:' + d.cantidad_neta + ' | mov:' + d.tipo_mov));
    allData = newData;
    tipoActivo = 'todos'; subtipoActivo = 'todos';
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
    document.querySelector('[data-tipo="todos"]').classList.add('active-all');
    render();
  } catch(err) { alert('Error al procesar el archivo: ' + err.message); }
}

let tipoActivo = 'todos';
let subtipoActivo = 'todos';
let searchQuery = '';
let kpiFilter = 'todos'; // 'todos' | 'warn' | 'venc'

function setKpiFilter(f) {
  kpiFilter = kpiFilter === f && f !== 'todos' ? 'todos' : f;
  document.getElementById('kpi-warn-card').classList.toggle('kpi-active', kpiFilter === 'warn');
  document.getElementById('kpi-venc-card').classList.toggle('kpi-active', kpiFilter === 'venc');
  render();
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀';
  document.querySelector('meta[name="theme-color"]').setAttribute('content', isLight ? '#f0f4f8' : '#0f1117');
  localStorage.setItem('tema', isLight ? 'light' : 'dark');
}

function onSearch(val) {
  searchQuery = val.toLowerCase().trim();
  document.getElementById('searchClear').classList.toggle('visible', searchQuery.length > 0);
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').classList.remove('visible');
  render();
}

function excelDateToISO(val) {
  if (!val) return null;
  // Si es número, es serial de Excel
  if (typeof val === 'number') {
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return d.toISOString().substring(0, 10);
  }
  // Si es Date object (cellDates: true a veces lo pasa así)
  if (val instanceof Date) {
    return val.toISOString().substring(0, 10);
  }
  // Si es string, tomar los primeros 10 chars
  return String(val).substring(0, 10);
}


function processData(movimientos) {
  const map = {};
  movimientos.forEach(m => {
    const key = m.producto;
    if (!map[key]) {
      map[key] = {
        producto: m.producto, pa: m.pa, tipo: m.tipo,
        subtipo: m.subtipo, unidad: m.unidad,
        stockTotal: 0, lotes: new Set(), lotesDetalle: {}, vencMin: null
      };
    }
    map[key].stockTotal += m.cantidad_neta;
    if (m.lote) {
      map[key].lotes.add(m.lote);
      if (!map[key].lotesDetalle[m.lote]) {
        map[key].lotesDetalle[m.lote] = { id: m.lote, stock: 0, venc: m.fecha_venc, unidad: m.unidad };
      }
      map[key].lotesDetalle[m.lote].stock += m.cantidad_neta;
    }
    if (m.fecha_venc) {
      const d = new Date(m.fecha_venc);
      if (!map[key].vencMin || d < new Date(map[key].vencMin)) map[key].vencMin = m.fecha_venc;
    }
  });
  return Object.values(map).filter(p => p.stockTotal > 0);
}

function getDias(venc) {
  if (!venc) return null;
  return Math.round((new Date(venc) - new Date()) / 86400000);
}

function getStatus(p) {
  const d = getDias(p.vencMin);
  if (d === null) return { text: 'S/D', cls: 'status-nd' };
  if (d < 0) return { text: 'VENCIDO', cls: 'status-venc' };
  if (d < 180) return { text: 'PRÓX.VENC', cls: 'status-warn' };
  return { text: 'OK', cls: 'status-ok' };
}

function getBadgeCls(tipo) {
  const t = (tipo||'').toLowerCase();
  if (t.includes('herb')) return 'badge-herb';
  if (t.includes('semi')) return 'badge-semi';
  if (t.includes('fung')) return 'badge-fung';
  if (t.includes('insec')) return 'badge-inse';
  if (t.includes('coad')) return 'badge-coady';
  return 'badge-default';
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('es-UY', { day: '2-digit', month: 'short', year: 'numeric' });
}

function render() {
  const productos = processData(allData);
  let filtered = tipoActivo === 'todos' ? productos : productos.filter(p => p.tipo === tipoActivo);

  // Filtro KPI vencimiento
  if (kpiFilter === 'warn') filtered = filtered.filter(p => { const d = getDias(p.vencMin); return d !== null && d >= 0 && d < 180; });
  if (kpiFilter === 'venc') filtered = filtered.filter(p => { const d = getDias(p.vencMin); return d !== null && d < 0; });

  const subtipos = [...new Set(filtered.map(p => p.subtipo).filter(s => s && s.trim()))];
  const subDiv = document.getElementById('subtipoScroll');
  if (subtipos.length > 0) {
    subDiv.innerHTML =
      `<button class="sub-btn ${subtipoActivo==='todos'?'active':''}" onclick="setSub('todos')">Todos</button>` +
      subtipos.map(s => `<button class="sub-btn ${subtipoActivo===s?'active':''}" onclick="setSub('${s}')">${s}</button>`).join('');
  } else {
    subDiv.innerHTML = '';
    subtipoActivo = 'todos';
  }

  if (subtipoActivo !== 'todos') filtered = filtered.filter(p => p.subtipo === subtipoActivo);

  // Search filter
  if (searchQuery) {
    filtered = filtered.filter(p =>
      p.producto.toLowerCase().includes(searchQuery) ||
      p.pa.toLowerCase().includes(searchQuery) ||
      p.tipo.toLowerCase().includes(searchQuery) ||
      (p.subtipo||'').toLowerCase().includes(searchQuery)
    );
  }

  // KPIs
  document.getElementById('kpi-prod').textContent = filtered.length;
  document.getElementById('kpi-lotes').textContent = filtered.reduce((s, p) => s + p.lotes.size, 0);
  document.getElementById('kpi-warn').textContent = filtered.filter(p => { const d = getDias(p.vencMin); return d !== null && d >= 0 && d < 180; }).length;
  document.getElementById('kpi-venc').textContent = filtered.filter(p => { const d = getDias(p.vencMin); return d !== null && d < 0; }).length;

  document.getElementById('rowCount').textContent = `${filtered.length} producto${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('cardsContainer');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">Sin productos para el filtro seleccionado</div>`;
    return;
  }

  container.innerHTML = filtered.map(p => {
    const status = getStatus(p);
    const dias = getDias(p.vencMin);
    const diasStr = dias !== null ? ` (${dias}d)` : '';
    const badgeCls = getBadgeCls(p.tipo);
    const cardId = 'card-' + p.producto.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');

    // Lotes detalle — solo los con stock > 0
    const lotesArr = Object.values(p.lotesDetalle).filter(l => l.stock > 0);
    const lotesHtml = lotesArr.length > 1 ? `
      <div class="lotes-toggle" onclick="toggleLotes('${cardId}')" id="toggle-${cardId}">
        <span class="lotes-toggle-label">▸ Ver ${lotesArr.length} lotes</span>
        <span class="lotes-toggle-arrow">▾</span>
      </div>
      <div class="lotes-acordeon" id="ac-${cardId}">
        ${lotesArr.map(l => {
          const dv = getDias(l.venc);
          let vencCls = '', vencTxt = l.venc ? fmtDate(l.venc) + (dv !== null ? ` (${dv}d)` : '') : 'S/D';
          if (dv !== null && dv < 0) vencCls = 'venc';
          else if (dv !== null && dv < 180) vencCls = 'warn';
          return `<div class="lote-row">
            <span class="lote-id">${l.id}</span>
            <div class="lote-info">
              <div class="lote-stock">${l.stock.toLocaleString('es-UY')} <span style="font-size:10px;color:var(--text2)">${l.unidad}</span></div>
              <div class="lote-venc ${vencCls}">${vencTxt}</div>
            </div>
          </div>`;
        }).join('')}
      </div>` : '';

    return `<div class="card">
      <div class="card-top">
        <div>
          <div class="card-name">${p.producto}</div>
          <div class="card-pa">${p.pa}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <span class="type-badge ${badgeCls}">${p.tipo||'—'}</span>
          <span class="status-pill ${status.cls}">${status.text}</span>
        </div>
      </div>
      <div class="card-grid">
        <div class="card-stat">
          <div class="card-stat-label">Stock</div>
          <div class="card-stat-val">${p.stockTotal.toLocaleString('es-UY')}</div>
          <div class="card-stat-unit">${p.unidad}</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-label">Lotes</div>
          <div class="card-stat-val" style="color:var(--blue)">${lotesArr.length}</div>
          <div class="card-stat-unit">activos</div>
        </div>
        <div class="card-stat">
          <div class="card-stat-label">Subtipo</div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--text2);margin-top:2px">${p.subtipo||'—'}</div>
        </div>
      </div>
      ${p.vencMin ? `<div class="card-venc">
        <span class="card-venc-label">Primer vencimiento</span>
        <span class="card-venc-date">${fmtDate(p.vencMin)}${diasStr}</span>
      </div>` : ''}
      ${lotesHtml}
    </div>`;
  }).join('');
}

function setTipo(tipo, btn) {
  tipoActivo = tipo;
  subtipoActivo = 'todos';
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  const t = tipo.toLowerCase();
  if (t === 'todos') btn.classList.add('active-all');
  else if (t === 'herbicida') btn.classList.add('active-herb');
  else if (t === 'semilla') btn.classList.add('active-semi');
  else if (t === 'fungicida') btn.classList.add('active-fung');
  else if (t === 'insecticida') btn.classList.add('active-inse');
  else btn.classList.add('active-coady');
  render();
}

function setSub(sub) { subtipoActivo = sub; render(); }

function toggleLotes(cardId) {
  const ac = document.getElementById('ac-' + cardId);
  const toggle = document.getElementById('toggle-' + cardId);
  if (!ac) return;
  ac.classList.toggle('open');
  toggle.classList.toggle('open');
  const label = toggle.querySelector('.lotes-toggle-label');
  const isOpen = ac.classList.contains('open');
  const n = ac.querySelectorAll('.lote-row').length;
  label.textContent = (isOpen ? '▾ Ocultar' : '▸ Ver') + ` ${n} lotes`;
}
